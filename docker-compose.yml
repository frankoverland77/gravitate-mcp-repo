version: "3.8"

services:
  # HTTP container for Cursor
  excalibrr-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXCALIBRR_VERSION: "${EXCALIBRR_VERSION:-v4.0.34-osp}"
        BUILD_DATE: "${BUILD_DATE}"
        VCS_REF: "${VCS_REF}"

    container_name: excalibrr-mcp-http

    ports:
      - "3001:3000"

    volumes:
      # Mount directories for generated content (persistent)
      - ./generated:/app/generated
      - ./screenshots:/app/screenshots
      - ./previews:/app/previews
      # Mount sibling Excalibrr directory
      - ../excalibrr:/app/excalibrr
      # Mount parent directory for project output
      - ../:/app/repos

    environment:
      - NODE_ENV=production
      - MCP_TRANSPORT=http
      - PORT=3000
      - EXCALIBRR_PATH=/app/excalibrr
      - EXAMPLES_PATH=/app/mcp-server/examples
      - OUTPUT_DIR=/app/repos

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.excalibrr-mcp-http.rule=Host(`excalibrr-mcp.localhost`)"
      - "traefik.http.services.excalibrr-mcp-http.loadbalancer.server.port=3000"

  # STDIO container for Claude Desktop
  excalibrr-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXCALIBRR_VERSION: "${EXCALIBRR_VERSION:-v4.0.34-osp}"
        BUILD_DATE: "${BUILD_DATE}"
        VCS_REF: "${VCS_REF}"

    container_name: excalibrr-mcp-stdio

    volumes:
      # Mount directories for generated content (persistent)
      - ./generated:/app/generated
      - ./screenshots:/app/screenshots
      - ./previews:/app/previews
      # Mount sibling Excalibrr directory
      - ../excalibrr:/app/excalibrr
      # Mount parent directory for project output
      - ../:/app/repos

    environment:
      - NODE_ENV=production
      - MCP_TRANSPORT=stdio
      - EXCALIBRR_PATH=/app/excalibrr
      - EXAMPLES_PATH=/app/mcp-server/examples
      - OUTPUT_DIR=/app/repos

    restart: unless-stopped

    # Keep container running for STDIO mode
    command: tail -f /dev/null

    labels:
      - "traefik.enable=false"

networks:
  default:
    name: excalibrr-network
